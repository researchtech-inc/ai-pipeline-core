name: Reusable Quality Checks

on:
  workflow_call:
    inputs:
      python-version-json:
        description: 'JSON array of Python versions to test'
        type: string
        required: false
        default: '["3.14"]'

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(inputs.python-version-json) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dev extras (locked)
        run: uv sync --frozen --extra dev

      - name: Check
        run: uv run dev check

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: uv run dev test --lane=integration

      - name: Examples smoke
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        run: uv run dev examples --smoke
