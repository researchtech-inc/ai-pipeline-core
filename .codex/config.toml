#:schema https://developers.openai.com/codex/config-schema.json

# Codex CLI project-local config.
#
# Registers the ai-dev-cli PreToolUse hook so the rules in the ai-dev-cli
# package apply identically under Codex and Claude Code. The hook reads
# tool_input.command and exits with code 2 + a stderr message to block —
# a contract both Claude Code and Codex honor.
#
# Onboarding: the repo must be trusted in Codex for this file to load.

[features]
hooks = true

[hooks]
[[hooks.PreToolUse]]
matcher = "^Bash$"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "python -m ai_dev_cli.hook"
timeout = 10
statusMessage = "checking dev CLI command policy"
