rules:
  - id: duck-typing-model-dump
    pattern: |
      hasattr($VAR, "model_dump")
    message: "Duck-typing for Pydantic models — use isinstance($VAR, BaseModel) instead"
    severity: WARNING
    languages: [python]

  - id: tiktoken-not-cached
    patterns:
      - pattern: |
          tiktoken.encoding_for_model(...)
      - pattern-not-inside: |
          def _get_tiktoken_encoding(...):
              ...
    message: "Use _get_tiktoken_encoding() cached wrapper instead of direct call"
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/test_*"

  - id: no-document-model-copy
    pattern: $DOC.model_copy(...)
    message: "Document.model_copy() is blocked. Use derive() or create()."
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        # Framework internals that use model_copy on non-Document Pydantic models
        # (ModelOptions, ModelResponse, Conversation, DeploymentResult, SpanInfo)
        - "**/_llm_core/**"
        - "**/llm/conversation.py"
        - "**/deployment/base.py"
        - "**/observability/_tracking/**"
        - "**/prompt_compiler/_*.py"
        - "**/prompt_compiler/api.py"
        - "**/replay/_execute.py"
        - "**/replay/cli.py"
        - "**/tests/**"

  - id: no-document-model-validate
    pattern: $DOC.model_validate(...)
    message: >
      Do not call DocumentSubclass.model_validate(...) in application code.
      Use create_root(), derive(), create(), or create_external() for new Documents.
      Reserve model_validate(...) for framework-owned deserialization of previously serialized Document payloads.
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        # Framework internals that use model_validate on non-Document Pydantic models
        - "**/_llm_core/**"
        - "**/llm/conversation.py"
        - "**/deployment/**"
        - "**/observability/**"
        - "**/prompt_compiler/**"
        - "**/replay/**"
        - "**/ai_pipeline_core/documents/document.py"
        - "**/ai_pipeline_core/_codec.py"
        - "**/tests/**"

  - id: no-model-convert-legacy
    pattern: $DOC.model_convert(...)
    message: "model_convert() renamed to retype(new_type, provenance='preserve'|'reset')"
    severity: ERROR
    languages: [python]

  - id: prefer-document-parsed-over-validate
    pattern-either:
      - pattern: $MODEL.model_validate_json($DOC.text)
      - pattern: $MODEL.model_validate_json($DOC.content)
    message: >
      Use doc.parsed (for Document[T]) or doc.as_pydantic_model(Model) instead of
      manual Model.model_validate_json(doc.text). Direct model_validate bypasses
      the Document API and misses the typed content system.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test_*"
        - "**/ai_pipeline_core/**"

  - id: json-yaml-fallback
    patterns:
      - pattern: |
          try:
              ...
              $OBJ.as_json(...)
              ...
          except $E:
              ...
              $OBJ.as_yaml(...)
              ...
    message: "JSON->YAML fallback is a bug — YAML is a JSON superset. Use extension-based dispatch."
    severity: ERROR
    languages: [python]

  - id: no-bare-document-factory-calls
    pattern-either:
      - pattern: Document.create_root(...)
      - pattern: Document.derive(...)
      - pattern: Document.create(...)
      - pattern: Document.create_external(...)
      - pattern: Document.from_dict(...)
    message: >
      Cannot call factory methods on bare Document — use a concrete Document subclass.
      Document is abstract and cannot be instantiated. Define a subclass first:
        class MyDoc(Document): ...
      Then call: MyDoc.create_root(...)
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/tests/**"
        - "**/test_*"
        - "**/ai_pipeline_core/documents/document.py"

  - id: no-direct-document-init
    patterns:
      - pattern: $CLASS(name=..., content=..., derived_from=..., ...)
      - pattern-not-inside: |
          @classmethod
          def $METHOD(cls, ...):
              ...
    message: >
      Do not instantiate Document subclasses directly. Use derive(), create(),
      create_external(), or create_root().
    severity: ERROR
    languages: [python]
    paths:
      include:
        - "ai_pipeline_core/"
        - "apps/"
      exclude:
        - "**/tests/**"
        - "**/test_*"
        - "**/ai_pipeline_core/documents/document.py"
        - "**/ai_pipeline_core/database/_hydrate.py"

  - id: no-document-from-dict
    pattern: $DOC.from_dict(...)
    message: >
      Document.from_dict() has been removed.
      Deserialize previously serialized payloads with DocumentSubclass.model_validate(...),
      or create a new Document with create_root(), derive(), create(), or create_external().
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/tests/**"
        - "**/test_*"
        - "**/ai_pipeline_core/documents/document.py"

  - id: no-build-partial-result
    patterns:
      - pattern: |
          class $DEPLOY(...):
              ...
              def build_partial_result(...):
                  ...
    message: >
      build_partial_result() is not supported.
      Deployments return a result only after the full plan completes.
      Remove build_partial_result() and inspect incomplete runs with ai-trace instead.
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/tests/**"
        - "**/test_*"

  - id: no-function-local-codec-class
    patterns:
      - pattern-either:
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(PipelineTask):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(PipelineFlow):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(Tool):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(Document):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(PipelineDeployment):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(DeploymentResult):
                      ...
          - pattern: |
              def $FUNC(...):
                  ...
                  class $CLS(FlowOptions):
                      ...
    message: >
      Class '$CLS' defined inside a function gets '<locals>' in __qualname__,
      making it unreplayable by the codec. Move it to module scope.
    severity: ERROR
    languages: [python]
    paths:
      exclude: ["**/tests/**"]

  - id: document-content-model-dump-without-generic
    pattern-either:
      - pattern: $DOC.create(..., content=$X.model_dump_json(...), ...)
      - pattern: $DOC.derive(..., content=$X.model_dump_json(...), ...)
      - pattern: $DOC.create_root(..., content=$X.model_dump_json(...), ...)
    message: >
      Document created with model_dump_json() content. Declare Document[ModelClass]
      on the Document subclass for creation-time schema validation, then pass the
      model instance directly as content= instead of serializing manually.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/test_*"
