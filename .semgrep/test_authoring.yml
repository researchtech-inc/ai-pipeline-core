rules:
  - id: no-live-llm-in-unit
    pattern-either:
      - pattern: await Conversation(model=$M, ...).send(...)
      - pattern: await Conversation(model=$M, ...).send_structured(...)
      - pattern: await generate(...)
    message: >
      Tests in tests/unit/ must not call live APIs. Move to tests/integration/
      for a real-LLM test, or patch the transport/generation boundary for a unit test.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/unit/

  - id: no-sleep-outside-qualification
    patterns:
      - pattern: await asyncio.sleep($N)
      - metavariable-regex:
          metavariable: $N
          regex: "^(?:[1-9][0-9_]*(?:\\.[0-9]+)?)$"
    message: >
      asyncio.sleep(>=1 s) is allowed only in tests/qualification/. Tests that
      wait on real time belong in the qualification lane.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/
      exclude:
        - /tests/qualification/
        - /benchmarks/
        - /examples/

  - id: no-stacked-parametrize
    pattern-either:
      - pattern: |
          @pytest.mark.parametrize(...)
          @pytest.mark.parametrize(...)
          def $F(...):
              ...
      - pattern: |
          @pytest.mark.parametrize(...)
          @pytest.mark.parametrize(...)
          async def $F(...):
              ...
    message: >
      Stacked @pytest.mark.parametrize causes multiplicative test instances.
      Use one parametrize axis, separate tests, or the qualification lane for a real matrix.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/
        - /benchmarks/
        - /examples/tests/

  - id: no-hardcoded-model
    patterns:
      - pattern-either:
          - pattern: AIModel(name=$MODEL, ...)
          - pattern: AIModel($MODEL, ...)
          - pattern: Conversation(model=$MODEL, ...)
      - metavariable-regex:
          metavariable: $MODEL
          regex: "^['\\\"].*['\\\"]$"
    message: >
      Tests must get models from tests/support/model_catalog.py. Use a provider-agnostic
      fixture or catalog constant; add a catalog entry for new model needs.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/
        - /benchmarks/
      exclude:
        - /tests/support/model_catalog.py
        - /benchmarks/llm_matrix/_models.py
        - /benchmarks/llm_matrix/_inventory.py
        - /tests/qualification/compatibility/_models.py

  - id: no-bulk-model-constants
    pattern-either:
      - pattern: ALL_MODELS
      - pattern: CORE_MODELS
      - pattern: SEARCH_MODELS
    message: >
      Bulk model constants are for benchmark and compatibility matrices only.
      Tests should use small capability fixtures from tests/support/model_catalog.py.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/
        - /benchmarks/
      exclude:
        - /benchmarks/
        - /tests/qualification/compatibility/

  - id: no-token-cap
    patterns:
      - pattern-either:
          - pattern: $F(..., max_completion_tokens=$N, ...)
          - pattern: $F(..., max_output_tokens=$N, ...)
          - pattern: $F(..., max_tokens=$N, ...)
      - metavariable-regex:
          metavariable: $N
          regex: '^[0-9][0-9_]*(\.[0-9]+)?$'
    message: >
      Token caps cause truncation flakes when prompts grow. Use framework defaults
      rather than hardcoded max token arguments in tests.
    severity: ERROR
    languages: [python]
    paths:
      include:
        - /tests/
        - /benchmarks/
      exclude:
        - /tests/unit/llm/test_model_options.py
