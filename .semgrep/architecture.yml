rules:
  - id: no-mutable-module-globals
    patterns:
      - pattern-either:
          - pattern: $VAR = []
          - pattern: $VAR = {}
          - pattern: $VAR = set()
          - pattern: $VAR = list()
          - pattern: $VAR = dict()
          - pattern: $VAR = deque()
          - pattern: $VAR = defaultdict(...)
      - pattern-not-inside: |
          class $C(...):
              ...
      - pattern-not-inside: |
          def $F(...):
              ...
      - pattern-not: __all__ = ...
    message: "Module-level mutable variable — use immutable types (tuple/frozenset) or ContextVar"
    severity: WARNING
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]
      exclude: ["**/ai_pipeline_core/pipeline/_file_rules.py"]

  - id: no-conditional-imports
    patterns:
      - pattern-either:
          - pattern: |
              try:
                  import $MOD
                  ...
              except ImportError:
                  ...
          - pattern: |
              try:
                  from $MOD import $NAME
                  ...
              except ImportError:
                  ...
      - pattern-not-inside: |
          def $F(...):
              ...
    message: "Conditional imports are forbidden — all dependencies must be declared in pyproject.toml"
    severity: ERROR
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]

  - id: no-runtime-test-skip
    pattern-either:
      - pattern: pytest.skip(...)
      - pattern: pytest.importorskip(...)
    message: "Runtime pytest.skip() is forbidden — use @pytest.mark.skip or @pytest.mark.skipif decorators instead"
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "conftest.py"  # Fixtures legitimately need pytest.skip() — decorators don't work inside fixtures

  - id: no-document-subclass-in-framework
    pattern-either:
      - pattern: |
          class $NAME(Document):
              ...
      - pattern: |
          class $NAME(Document[$T]):
              ...
    message: "Document subclasses must not be defined inside ai_pipeline_core — Document is a base class for applications to subclass"
    severity: ERROR
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]

  - id: no-function-local-replayable-models
    patterns:
      - pattern-inside: |
          def $F(...):
              ...
      - pattern-either:
          - pattern: |
              class $C(BaseSettings):
                  ...
          - pattern: |
              class $C($X, BaseSettings):
                  ...
          - pattern: |
              class $C(BaseModel):
                  ...
          - pattern: |
              class $C($X, BaseModel):
                  ...
    message: >
      Class '$C' defined inside function '$F' has __qualname__ containing '<locals>',
      making it unresolvable by the codec during replay. Move the class to module scope.
    severity: ERROR
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]

  - id: no-document-created-at-mutation
    patterns:
      - pattern-either:
          - pattern: replace($EXISTING, ..., created_at=$TS, ...)
          - pattern: DocumentRecord(..., created_at=$TS, ...)
      - metavariable-regex:
          metavariable: $TS
          regex: "datetime\\.now\\(|_utcnow\\("
    message: >
      DocumentRecord.created_at is immutable after initial creation. Preserve the
      original created_at and use a separate updated_at field for version tracking.
    severity: ERROR
    languages: [python]
    paths:
      include: ["**/ai_pipeline_core/database/**"]
      exclude: ["**/tests/**"]

  - id: suspicious-flow-options-inheritance
    pattern-regex: 'class\s+\w*(?:Task|Writer|Processor|Handler|Worker|Config)\w*\(FlowOptions\)'
    message: >
      This class name suggests task-level configuration but inherits FlowOptions
      (BaseSettings). FlowOptions fields are overridable via environment variables.
      Use BaseModel instead for programmatically-constructed options.
    severity: WARNING
    languages: [python]
    paths:
      exclude:
        - "**/tests/**"
