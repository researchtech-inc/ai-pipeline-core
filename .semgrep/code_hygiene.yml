rules:
  # Rule: async def must have await (backup for ruff RUF029)
  # Excludes: Protocol stubs, ABC base classes, in-memory implementations
  - id: async-function-without-await
    patterns:
      - pattern: |
          async def $F(...):
              ...
      - pattern-not: |
          async def $F(...):
              ...
              await ...
      - pattern-not: |
          async def $F(...):
              ...
              async for ... in ...:
                  ...
      - pattern-not: |
          async def $F(...):
              ...
              async with ...:
                  ...
      # Allow stubs (just ... or pass)
      - pattern-not: |
          async def $F(...):
              ...
    message: "async function '$F' contains no await/async for/async with — remove async or add async operation"
    severity: ERROR
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]
      exclude:
        - "**/tests/**"
        - "**/examples/**"
        - "**/protocol.py"
        - "**/protocols.py"
        - "**/*_protocol.py"
        - "**/base.py"
        - "**/memory.py"
        - "**/_types.py"

  # Rule: Protocol separation - Protocols must be in dedicated files
  # Excludes internal protocols (underscore-prefixed) and files that are already dedicated
  - id: protocol-in-dedicated-files
    pattern: |
      class $P(Protocol):
          ...
    paths:
      include: ["ai_pipeline_core/"]
      exclude:
        - "*_protocol.py"
        - "*_protocols.py"
        - "**/protocols.py"
        - "**/protocols/*.py"
        - "**/types.py"
        - "**/_types.py"
        - "**/__init__.py"
        - "**/protocol.py"
        - "**/_hashing.py"
        - "**/_models.py"
        - "**/_initialization.py"
        - "**/deployment/base.py"
        - "**/_span_types.py"
        - "**/_codec.py"
    message: "Protocol '$P' must be in a dedicated file (*_protocol.py, protocols.py, or _types.py)"
    severity: ERROR
    languages: [python]

  # Rule: No patch reference comments
  - id: no-patch-reference-comments
    languages: [generic]
    severity: ERROR
    message: "Patch/workaround comments are forbidden. Address root cause or document via regression tests."
    pattern-regex: '#\s*(FIX\s*\d|[Ff]ixes?\s+(#\d|issue|bug)|[Pp]atch\s+(for|to)|[Ww]orkaround\s+(for|to))'
    paths:
      include:
        - "*.py"
      exclude:
        - "**/tests/**"

  # Rule: No __import__() calls — use importlib.import_module() instead
  - id: no-dunder-import
    pattern: __import__(...)
    message: "Do not use __import__(). Use importlib.import_module() instead."
    severity: ERROR
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]

  # Note: Silent exception handling is enforced by ruff BLE001/S110/E722
  # Semgrep pattern for except blocks doesn't parse correctly, so we rely on ruff

  - id: codec-unguarded-model-validate
    patterns:
      - pattern-either:
          - pattern: $CLS.model_validate($DATA)
          - pattern: $CLS.model_validate_json($DATA)
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
    message: >
      model_validate() in codec decode path must be wrapped in try/except and
      re-raised as CodecError to maintain a consistent error boundary.
    severity: ERROR
    languages: [python]
    paths:
      include: ["**/ai_pipeline_core/_codec.py"]

  - id: no-silent-walrus-data-skip
    pattern: |
      {
          $KEY: $BLOB.content
          for $SHA in $ITER
          if ($BLOB := $DICT.get($SHA)) is not None
      }
    message: >
      Dict comprehension silently omits missing entries via walrus operator. Collect
      missing keys and raise or log an actionable error instead of returning partial data.
    severity: WARNING
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]

  - id: no-full-log-rewrite-after-extend
    patterns:
      - pattern-inside: |
          def $F(self, logs: list[LogRecord], ...):
              ...
              self._logs.extend(logs)
              ...
      - pattern: |
          content = "\n".join(json.dumps(_serialize_record($LOG), sort_keys=True, default=_json_default) for $LOG in self._logs)
    message: >
      Append-only log persistence must serialize only the new batch. Rewriting
      self._logs makes persistence O(n^2).
    severity: WARNING
    languages: [python]
    paths:
      include: ["**/ai_pipeline_core/database/filesystem/"]

  # Rule: No Example: blocks in docstrings — canonical rule is in docstring_rules.yml

  - id: no-hard-coded-slicing
    patterns:
      - pattern: $X[:$N]
      - metavariable-regex:
          metavariable: $X
          regex: "^(documents?|messages?|items?|results?|records?|handles?|flows?|tasks?|rounds?|logs?|spans?)$"
      - metavariable-regex:
          metavariable: $N
          regex: "^[0-9]+$"
    message: >
      Hard-coded slice [:N] discards data silently. Use an explicit
      truncation helper with a named constant and log what was dropped.
      If the bound is known-small and documented, add # nosemgrep with
      the bound justification.
    severity: WARNING
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]
      exclude: ["**/tests/**", "**/examples/**"]

  - id: no-double-nested-loop
    patterns:
      - pattern: |
          for $LEFT in $LEFT_ITEMS:
              ...
              for $RIGHT in $RIGHT_ITEMS:
                  ...
                  if $LEFT == $RIGHT:
                      ...
    message: >
      Nested for-loops suggest O(n^2) complexity. Use dict lookup, set
      intersection, or itertools for O(n) alternatives. If n is bounded,
      add a constant and comment documenting the bound.
    severity: WARNING
    languages: [python]
    paths:
      include: ["ai_pipeline_core/"]
      exclude: ["**/tests/**", "**/examples/**"]

  - id: no-dict-unpacking-task-flow-call
    pattern-either:
      - pattern: $CLS.run(**$DICT)
      - pattern: await $CLS.run(**$DICT)
    message: >
      Do not unpack dicts into task or flow calls. Pass named arguments
      explicitly so the type checker can verify each parameter.
      Write: TaskClass.run(source=doc, model=model)
      Not:   TaskClass.run(**params_dict)
    severity: ERROR
    languages: [python]
    paths:
      exclude:
        - "**/tests/**"
        - "ai_pipeline_core/deployment/_deployment_runtime.py"
