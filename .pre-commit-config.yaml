---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages:
          - pre-commit
      - id: end-of-file-fixer
        stages:
          - pre-commit
      - id: check-yaml
        stages:
          - pre-commit
      - id: check-added-large-files
        exclude: uv.lock
        stages:
          - pre-commit
      - id: check-json
        stages:
          - pre-commit
      - id: check-merge-conflict
        stages:
          - pre-commit
      - id: check-toml
        stages:
          - pre-commit
      - id: debug-statements
        stages:
          - pre-commit
      - id: mixed-line-ending
        stages:
          - pre-commit
  - repo: local
    hooks:
      - id: dev-format
        name: dev format
        entry: dev format
        language: system
        pass_filenames: false
        stages:
          - pre-commit
      - id: dev-check
        name: dev check (full pipeline)
        entry: dev check
        language: system
        pass_filenames: false
        fail_fast: true
        stages:
          - pre-commit
